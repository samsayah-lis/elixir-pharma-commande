[build]
  base    = "elixir-commande"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# Cron toutes les 30min pour rafraîchir les stocks Odoo → Supabase
[[crons]]
  schedule = "*/30 * * * *"
  function = "stock-refresh"
